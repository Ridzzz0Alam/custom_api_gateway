admin:
  port: 8081
  readTimeout: 5
  gracefultimeout: 5
  tls:
    enabled: false
    certFile: "path/to/cert.pem"
    keyFile: "path/to/key.pem"
server:
  host: localhost
  port: 8080
  readTimeout: 5
  writeTimeout: 10
  gracefultimeout: 5
  tls:
    enabled: false
    certFile: "path/to/cert.pem"
    keyFile: "path/to/key/pem"
  metrics:
    prefix: "api_gateway"
    buckets: [0.005, 0.01, 0.025, 0.05, 0.1]
  registry:
    hearbeatInterval: 15
    services: